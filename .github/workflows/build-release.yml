name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build with Maven
        run: mvn clean package assembly:single
      
      - name: Create executable with jpackage
        run: |
          jpackage --input target ^
            --name SQL-Insert-Converter ^
            --main-jar SQL-Insert-Converter.jar ^
            --main-class com.example.gldb.HelloApplication ^
            --type exe ^
            --win-menu ^
            --win-shortcut ^
            --app-version 1.1 ^
            --dest output
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SQL-Insert-Converter-exe
          path: output/
