name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # Trigger bei Tags wie v1.0.0, v1.1.0 etc.

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install

      - name: Create JLink Image
        run: mvn javafx:jlink

      - name: Prepare Version String
        id: prep_version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("v", "")
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Create EXE with JPackage
        run: |
          jpackage --type exe `
            --dest dist `
            --name "SQL-Insert-Converter" `
            --module com.hiprofession.sqlinsertconv/com.hiprofession.sqlinsertconv.HelloApplication `
            --runtime-image target/app `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --vendor "HiProfession" `
            --app-version "${{ env.APP_VERSION }}"

      - name: Get EXE filename
        id: get_exe
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path dist/*.exe | Select-Object -First 1
          echo "EXE_PATH=$($exePath.FullName)" >> $env:GITHUB_ENV
          echo "EXE_NAME=$($exePath.Name)" >> $env:GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
